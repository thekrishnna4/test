<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sneha</title>
    
    <style>
        /* 1. FONT REGISTRATION - DOUBLE CHECK YOUR FILENAMES! */
        @font-face {
            font-family: 'Harmond';
            /* Make sure this filename is EXACTLY what is in your folder */
            src: url('Harmond Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Absans';
            /* Make sure this filename is EXACTLY what is in your folder */
            src: url('Absans Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --birthday-pink: #FF6B9D; 
            --text-black: #1a1a1a;
            /* If the custom font fails, it will use Times New Roman or Arial */
            --font-heading: 'Harmond', 'Playfair Display', serif; 
            --font-body: 'Absans', 'Inter', sans-serif;
        }

        /* 2. RESET & LAYOUT */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: var(--font-body);
            color: var(--text-black);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0 10%;
            gap: 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 3. TEXT SECTION */
        .content-left {
            flex: 1;
            z-index: 2;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(3.5rem, 7vw, 6rem);
            line-height: 1;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .sub-text {
            font-size: 1.25rem;
            margin-bottom: 40px;
            font-weight: 300;
            color: #444;
        }

        .btn {
            display: inline-block;
            background-color: var(--birthday-pink);
            color: #ffffff;
            text-decoration: none;
            padding: 20px 60px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .btn:hover {
            opacity: 0.9;
            letter-spacing: 3px;
        }

        /* 4. PHOTO SECTION */
        .content-right {
            flex: 1.3; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-container {
            width: 100%;
            max-width: 600px; /* Large size for desktop */
        }

        .photo-container img {
            width: 100%;
            height: auto; 
            display: block;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* 5. MOBILE VIEW (CRITICAL FIXES) */
        @media (max-width: 850px) {
            .container {
                flex-direction: column; /* Stacks photo on top of text */
                padding: 60px 24px;
                text-align: center;
                gap: 40px;
            }

            .content-right {
                width: 100%;
                order: 1; /* Ensures photo is first */
            }

            .content-left {
                width: 100%;
                order: 2; /* Ensures text is second */
            }

            .photo-container {
                width: 100%; /* Uses full width of phone */
                max-width: 100%;
            }

            h1 {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="content-right">
            <div class="photo-container">
                <img src="snehaphoto.jpg" alt="Sneha">
            </div>
        </div>

        <div class="content-left">
            <h1>Hello Sneha</h1>
            <p class="sub-text">I have created something for you.</p>
            <a href="story.html" class="btn">Start</a>
        </div>

    </div>

</body>
</html>
