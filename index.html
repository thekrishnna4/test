<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sneha</title>
    
    <style>
        /* 1. FONT REGISTRATION */
        @font-face {
            font-family: 'Harmond';
            src: url('Harmond Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Absans';
            src: url('Absans Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --birthday-pink: #FF6B9D; 
            --text-black: #1a1a1a;
            --font-heading: 'Harmond', serif; 
            --font-body: 'Absans', sans-serif;
        }

        /* 2. RESET & LAYOUT */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: var(--font-body);
            color: var(--text-black);
            overflow-x: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0 10%;
            gap: 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 3. TEXT SECTION & TYPING ANIMATION */
        .content-left {
            flex: 1;
            z-index: 2;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(3.5rem, 7vw, 6rem);
            line-height: 1;
            margin-bottom: 10px;
            font-weight: bold;
            /* Typing Animation Setup */
            overflow: hidden; 
            white-space: nowrap; 
            border-right: 3px solid var(--birthday-pink); /* The "cursor" */
            width: 0; 
            animation: typing 1.5s steps(15, end) forwards, blink 0.8s infinite;
        }

        .sub-text {
            font-size: 1.25rem;
            margin-bottom: 40px;
            font-weight: 300;
            color: #444;
            /* Fade in delay so it appears after the heading finishes typing */
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 1.6s;
        }

        .btn {
            display: inline-block;
            background-color: var(--birthday-pink);
            color: #ffffff;
            text-decoration: none;
            padding: 20px 60px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 2s;
            transition: all 0.3s ease;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-3px);
        }

        /* 4. PHOTO SECTION & APPEARANCE ANIMATION */
        .content-right {
            flex: 1.3; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-container {
            width: 100%;
            max-width: 600px;
            /* Slide up and fade in animation */
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1.2s ease-out forwards;
            animation-delay: 0.5s;
        }

        .photo-container img {
            width: 100%;
            height: auto; 
            display: block;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* 5. KEYFRAMES (The Animation Logic) */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--birthday-pink); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 6. MOBILE VIEW */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                padding: 60px 24px;
                text-align: center;
                gap: 40px;
                justify-content: flex-start;
            }
            .content-right { order: 1; width: 100%; }
            .content-left { order: 2; width: 100%; }
            
            h1 { 
                font-size: 3rem; 
                margin: 0 auto; /* Centers the typing box on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="content-right">
            <div class="photo-container">
                <img src="snehaphoto.jpg" alt="Sneha">
            </div>
        </div>

        <div class="content-left">
            <h1>Hello Sneha</h1>
            <p class="sub-text">I have created something for you.</p>
            <a href="story.html" class="btn">Start</a>
        </div>
    </div>

</body>
</html>
