<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sneha</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --birthday-pink: #FF6B9D; 
            --text-black: #1a1a1a;
            --font-heading: 'Playfair Display', serif; /* Harmond Alternative */
            --font-body: 'Inter', sans-serif;           /* Absans Alternative */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: var(--font-body);
            color: var(--text-black);
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0 8%;
            gap: 60px; /* Space between text and photo */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Left Side Content */
        .content-left {
            flex: 1;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 5.5rem); /* Adjusts size based on screen */
            margin: 0;
            line-height: 1;
            font-weight: 700;
        }

        .sub-text {
            font-size: 1.2rem;
            margin: 15px 0 45px 0;
            font-weight: 300;
            color: #555;
        }

        .btn {
            display: inline-block;
            background-color: var(--birthday-pink);
            color: #ffffff;
            text-decoration: none;
            padding: 20px 60px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            /* Sharp rectangle as requested */
            border: none; 
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* Right Side Image */
        .content-right {
            flex: 4;
            display: flex;
            justify-content: center;
        }

       .photo-container {
    width: 100%;
    max-width: 450px; 
    margin: 0 auto; /* Add this to center the block itself */
}

        .photo-container img {
            width: 150%;
            height: auto; /* This prevents cropping and maintains original ratio */
            display: block;
            box-shadow: 20px 20px 0px #f9f9f9; /* Subtle offset background instead of doodle */
        }

        /* Responsive for Mobile */
        @media (max-width: 850px) {
            .container {
                flex-direction: column-reverse;
                text-align: center;
                padding: 60px 20px;
            }
            .content-right {
        width: 100%; /* Change from 80% to 100% */
        display: flex;
        justify-content: center;
        margin-bottom: 40px; /* Space between photo and text */
    }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="content-left">
            <h1>Hello Sneha</h1>
            <p class="sub-text">I have created something for you.</p>
            <a href="story.html" class="btn">START</a>
        </div>

        <div class="content-right">
            <div class="photo-container">
                <img src="snehaphoto.jpg" alt="Sneha">
            </div>
        </div>
    </div>

</body>
</html>
