<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Heart Tree</title>
    <style>
        @font-face { font-family: 'Harmond'; src: url('Harmond Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'Absans'; src: url('Absans Regular.otf') format('opentype'); font-weight: normal; }

        :root {
            --pink-1: #FF6B9D; --pink-2: #FFB7CE; --pink-3: #D81B60;
            --font-heading: 'Harmond', serif;
            --font-body: 'Absans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff; overflow-x: hidden; font-family: var(--font-body); }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        /* --- REFINED TREE SECTION --- */
        #tree-wrapper { 
            position: relative; 
            width: 100%; 
            height: 450px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end;
        }
        
        svg { z-index: 5; position: relative; }

        .stem {
            fill: none; stroke: #4E342E; stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawStem 1.2s ease-out forwards;
        }

        @keyframes drawStem { to { stroke-dashoffset: 0; } }

        .heart {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 2;
            animation: pop 0.4s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- BIRTHDAY SECTION --- */
        .bday-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .bday-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-align: left;
            line-height: 1.1;
        }

        /* Multi-line typing effect */
        .bday-text span {
            display: block; /* Forces line by line */
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            border-right: 3px solid var(--pink-1);
        }

        .animate-line-1 { animation: typing 0.8s steps(10, end) forwards; }
        .animate-line-2 { animation: typing 0.8s steps(10, end) forwards 0.8s; }
        .animate-line-3 { animation: typing 0.8s steps(10, end) forwards 1.6s; }

        .cake-img {
            width: 150px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateX(20px);
        }

        .show-cake {
            animation: slideIn 1s ease forwards 2s;
        }

        .btn-next {
            background: var(--pink-1);
            color: #fff;
            padding: 18px 60px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 40px;
            display: inline-block;
        }

        @keyframes typing { 
            from { width: 0; border-right: 3px solid var(--pink-1); } 
            to { width: 100%; border-right: none; } 
        }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 600px) {
            .bday-container { flex-direction: column; text-align: center; }
            .bday-text { text-align: center; }
            .bday-text span { margin: 0 auto; }
            .cake-img { width: 200px; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="section">
        <div id="tree-wrapper">
            <svg viewBox="0 0 200 200" width="280">
                <path class="stem" d="M100,200 L100,100 M100,150 L130,120 M100,130 L70,100 M100,110 L120,80 M100,110 L80,80" />
            </svg>
            <div id="hearts-container"></div>
        </div>
        <p style="margin-top: 20px; letter-spacing: 5px; color: #FF6B9D;">SCROLL</p>
    </div>

    <div class="section" id="bday-section">
        <div class="bday-container">
            <h1 class="bday-text" id="bday-title">
                <span id="l1">Happy</span>
                <span id="l2">Birthday</span>
                <span id="l3">Sneha</span>
            </h1>
            
            <img src="cake.jpg" alt="Birthday Cake" class="cake-img" id="cake-photo">
        </div>

        <a href="gallery.html" class="btn-next">NEXT</a>
        <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">click here *</p>
    </div>

    <script>
        const container = document.getElementById('hearts-container');
        const colors = ['#FF6B9D', '#FFB7CE', '#D81B60'];
        
        function createHearts() {
            for(let i=0; i<600; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤';
                    heart.style.color = colors[Math.floor(Math.random() * 3)];
                    
                    // CONSTRAINED CIRCULAR CANOPY LOGIC
                    // This keeps hearts in a "bulb" shape at the top of the stem
                    const radius = 100; 
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.sqrt(Math.random()) * radius;
                    
                    const x = Math.cos(angle) * dist + (window.innerWidth / 2);
                    const y = Math.sin(angle) * dist + 150; // Centered on the upper branches
                    
                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                    heart.style.fontSize = (Math.random() * 12 + 6) + 'px';
                    container.appendChild(heart);
                }, i * 3);
            }
        }

        setTimeout(createHearts, 600);

        // Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    document.getElementById('l1').classList.add('animate-line-1');
                    document.getElementById('l2').classList.add('animate-line-2');
                    document.getElementById('l3').classList.add('animate-line-3');
                    document.getElementById('cake-photo').classList.add('show-cake');
                }
            });
        }, { threshold: 0.5 });

        observer.observe(document.getElementById('bday-section'));
    </script>
</body>
</html>
