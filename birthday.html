<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Page</title>
    <style>
        @font-face {
            font-family: 'Harmond Bold';
            src: url('Harmond bold.otf') format('opentype');
        }

        @font-face {
            font-family: 'Absans Regular';
            src: url('Absans Regular.otf') format('opentype');
        }

        :root {
            --pink-1: #FF6B9D;
            --polaroid-brown: #C4A484; 
            --page-beige: #F5F5DC;
            --font-heading: 'Harmond Bold', serif;
            --font-body: 'Absans Regular', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--page-beige);
            overflow-x: hidden;
            font-family: var(--font-body);
            text-align: center;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- HEART DOODLE (FIXED POSITIONING) --- */
        .drawing-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }

        .path-draw {
            fill: none;
            stroke: var(--pink-1);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawPath 2.5s linear forwards;
        }

        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        .scrooldown-block {
            margin-top: 30px; /* Space to prevent overlap */
            color: var(--pink-1);
            font-weight: bold;
            letter-spacing: 5px;
            opacity: 0;
            animation: fadeIn 1s forwards 2s;
        }

        /* --- TYPING ANIMATION (FAST) --- */
        .bday-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 1;
            margin: 40px 0;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .sneha-long { font-size: clamp(1.8rem, 7vw, 3.5rem) !important; }

        .animate-type { animation: type 0.8s steps(20) forwards; } /* Faster typing */

        @keyframes type { from { width: 0; } to { width: 100%; } }

        /* --- INSTRUCTION BOX --- */
        .instruction-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 90%;
            border: 2px solid var(--pink-1);
        }

        /* --- 2x4 GRID --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
        }

        .polaroid {
            background: var(--polaroid-brown);
            padding: 10px 10px 30px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            cursor: pointer;
        }

        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .polaroid.show { animation: fadeInSlow 0.8s ease forwards; }

        /* --- POPUP --- */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .popup-polaroid-frame {
            background: var(--polaroid-brown);
            padding: 15px 15px 50px 15px;
            max-width: 100%;
            animation: popIn 0.3s ease-out;
        }

        #popup-img { max-width: 100%; max-height: 60vh; }
        #popup-text {
            font-family: var(--font-body);
            font-size: 1.2rem;
            margin-top: 15px;
            color: #fff;
            padding: 0 10px;
        }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeInSlow { to { opacity: 1; transform: translateY(0); } }

        .btn-next {
            margin: 40px 0;
            background: var(--pink-1);
            color: white;
            padding: 15px 60px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="section">
        <div class="drawing-block">
            <svg viewBox="0 0 100 150" class="heart-svg">
                <path class="path-draw" d="M30,40 C10,20 10,60 50,85 C90,60 90,20 70,40 C50,60 50,85 50,140 M40,130 L50,140 L60,130" />
            </svg>
            <div class="scrooldown-block">SCROLL DOWN</div>
        </div>
    </div>

    <div class="section" id="wish-section">
        <h1 class="bday-text">
            <span id="l1">Happy</span>
            <span id="l2">Birthday</span>
            <span id="l3" class="sneha-long">Snehaaaaaaaaaaaaaaaaaaaa</span>
        </h1>

        <img src="cake.jpg" style="width: 180px; border-radius: 10px;">

        <div class="instruction-box">
            <h3 style="font-family: var(--font-heading);">there is a message for you</h3>
            <p>in every photo tap on them to see it</p>
        </div>

        <div class="gallery-container">
            <div class="polaroid" data-msg="“She’s not just pretty, she’s my peace.”"><img src="snehap1.JPEG"></div>
            <div class="polaroid" data-msg="“In a world full of trends, she’s my forever.”"><img src="snehap2.JPEG"></div>
            <div class="polaroid" data-msg="“Her smile >>> everything.”"><img src="snehap3.jpg"></div>
            <div class="polaroid" data-msg="“Lucky? No. Blessed.”"><img src="snehap4.jpg"></div>
            <div class="polaroid" data-msg="“She walked in, and suddenly life made sense.”"><img src="snehap5.jpg"></div>
            <div class="polaroid" data-msg="“Soft heart. Strong soul. My girl.”"><img src="snehap6.jpeg"></div>
            <div class="polaroid" data-msg="“Every love song finally has a face.”"><img src="snehap7.jpeg"></div>
            <div class="polaroid" data-msg="“Mine. Always.” ❤️"><img src="snehap8.jpeg"></div>
        </div>

        <a href="story.html" class="btn-next">NEXT</a>
    </div>

    <div id="popup-overlay">
        <div class="popup-polaroid-frame">
            <img id="popup-img" src="">
            <p id="popup-text"></p>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.getElementById('l1').classList.add('animate-type');
                    setTimeout(() => document.getElementById('l2').classList.add('animate-type'), 800);
                    setTimeout(() => document.getElementById('l3').classList.add('animate-type'), 1600);
                    
                    document.querySelectorAll('.polaroid').forEach((p, i) => {
                        setTimeout(() => p.classList.add('show'), 2400 + (i * 200)); 
                    });
                }
            });
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('wish-section'));

        const overlay = document.getElementById('popup-overlay');
        const popImg = document.getElementById('popup-img');
        const popText = document.getElementById('popup-text');

        document.querySelectorAll('.polaroid').forEach(p => {
            p.addEventListener('click', () => {
                popImg.src = p.querySelector('img').src;
                popText.innerText = p.getAttribute('data-msg');
                overlay.style.display = 'flex';
            });
        });

        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });
    </script>
</body>
</html>
