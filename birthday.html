<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Page</title>
    <style>
        /* 1. Register Your Exact Font Files */
        @font-face {
            font-family: 'Harmond Bold';
            src: url('Harmond bold.otf') format('opentype'); /* Verified filename from your folder image */
        }

        @font-face {
            font-family: 'Absans Regular';
            src: url('Absans Regular.otf') format('opentype'); /* Verified filename from your folder image */
        }

        :root {
            --pink-1: #FF6B9D;
            --polaroid-tan: #D2B48C; /* More brown tint */
            --page-beige: #F5F5DC;
            --font-heading: 'Harmond Bold', serif;
            --font-body: 'Absans Regular', sans-serif;
        }

        /* 2. Page & Layout Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--page-beige);
            overflow-x: hidden;
            font-family: var(--font-body);
            text-align: center;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- THE FIXED NO-OVERLAP DOODLE STRUCTURE --- */
        .drawing-block {
            display: flex;
            flex-direction: column; /* VERTICAL STACK */
            align-items: center;
            width: 100%;
            max-width: 300px;
        }

        .doodle-container {
            width: 100%;
            height: auto; /* Uses the natural SVG height */
        }

        .heart-svg { width: 100%; }

        .path-draw {
            fill: none;
            stroke: var(--pink-1);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawPath 3s linear forwards; /* Standard draw speed */
        }

        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        /* No Overlap Text Block */
        .scrooldown-block {
            margin-top: 20px; /* Space BELOW the drawing */
            color: var(--pink-1);
            font-weight: bold;
            letter-spacing: 5px;
            opacity: 0;
            animation: fadeIn 1.5s forwards 2.5s; /* Appears after drawing */
        }

        /* --- NEW: THE INSTRUCTION MESSAGE BOX --- */
        .instruction-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin: 30px auto;
            max-width: 90%;
            width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .instruction-box h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #333;
        }

        .instruction-box p {
            font-size: 1rem;
            color: #666;
        }

        /* --- TEXT SECTION & FAST TYPING --- */
        .bday-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 1;
            margin: 40px 0;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .sneha-long { font-size: clamp(1.8rem, 7vw, 3.5rem) !important; }

        /* FAST Typing Animation (1s per line, total 3s) */
        .animate-type { animation: type 1s steps(25) forwards; }

        @keyframes type { from { width: 0; } to { width: 100%; } }

        /* --- 2x4 POLAROID GRID (MOBILE-FRIENDLY) --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* FORCED 2x4 grid on phone */
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 30px auto;
        }

        .polaroid {
            background: var(--polaroid-tan);
            padding: 10px 10px 30px 10px; /* Polaroid bottom spacing */
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.3s ease;
        }

        .polaroid:hover { transform: scale(1.05); z-index: 10; }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .polaroid.show { animation: fadeInSlow 1s ease forwards; }

        /* --- POPUP OVERLAY WITH THE SAME FRAME --- */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-polaroid-frame {
            background: var(--polaroid-tan); /* Maintains frame identity */
            padding: 15px 15px 50px 15px;
            max-width: 85%;
            position: relative;
            animation: minimalFade 0.3s ease-out; /* Basic pop-in animation */
        }

        #popup-img {
            max-width: 100%;
            max-height: 60vh;
            display: block;
        }

        #popup-text {
            font-family: var(--font-body);
            font-size: 1.1rem;
            margin-top: 15px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Global Animation Utilities */
        .btn-next {
            margin: 50px 0;
            background: var(--pink-1);
            color: white;
            padding: 18px 70px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        @keyframes fadeInSlow { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes minimalFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="section">
        <div class="drawing-block">
            <div class="doodle-container">
                <svg class="heart-svg" viewBox="0 0 100 150">
                    <path class="path-draw" d="M30,40 C10,20 10,60 50,85 C90,60 90,20 70,40 C50,60 50,85 50,140 M40,130 L50,140 L60,130" />
                </svg>
            </div>
            <div class="scrooldown-block">SCROLL DOWN</div>
        </div>
    </div>

    <div class="section" id="wish-section">
        <h1 class="bday-text">
            <span id="l1">Happy</span>
            <span id="l2">Birthday</span>
            <span id="l3" class="sneha-long">Snehaaaaaaaaaaaaaaaaaaaa</span>
        </h1>

        <img src="cake.jpg" alt="Cake" style="width: 200px; border-radius: 10px; margin-bottom: 10px;">

        <div class="instruction-box">
            <h2>there is a message for you</h2>
            <p>in every photo tap on them to see this</p>
        </div>

        <div class="gallery-container">
            <div class="polaroid" data-msg="“Message 1”"><img src="snehap1.JPEG"></div>
            <div class="polaroid" data-msg="“Message 2”"><img src="snehap2.JPEG"></div>
            <div class="polaroid" data-msg="“Message 3”"><img src="snehap3.jpg"></div>
            <div class="polaroid" data-msg="“Message 4”"><img src="snehap4.jpg"></div>
            <div class="polaroid" data-msg="“Message 5”"><img src="snehap5.jpg"></div>
            <div class="polaroid" data-msg="“Message 6”"><img src="snehap6.jpeg"></div>
            <div class="polaroid" data-msg="“Message 7”"><img src="snehap7.jpeg"></div>
            <div class="polaroid" data-msg="“Message 8”"><img src="snehap8.jpeg"></div>
        </div>

        <a href="story.html" class="btn-next">NEXT</a>
        <p style="margin-top: 10px; color: #888; font-size: 0.8rem;">click here *</p>
    </div>

    <div id="popup-overlay">
        <div class="popup-polaroid-frame">
            <img id="popup-img" src="">
            <p id="popup-text"></p>
        </div>
    </div>

    <script>
        // Intersection Observer for rapid animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // FAST Typing (1s gap)
                    document.getElementById('l1').classList.add('animate-type');
                    setTimeout(() => document.getElementById('l2').classList.add('animate-type'), 1000);
                    setTimeout(() => document.getElementById('l3').classList.add('animate-type'), 2000);
                    
                    // Slightly slower photo staggered entry for aesthetic
                    document.querySelectorAll('.polaroid').forEach((p, i) => {
                        setTimeout(() => p.classList.add('show'), 3000 + (i * 300)); 
                    });
                }
            });
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('wish-section'));

        // Popup Logic including the Frame
        const overlay = document.getElementById('popup-overlay');
        const popImg = document.getElementById('popup-img');
        const popText = document.getElementById('popup-text');

        document.querySelectorAll('.polaroid').forEach(p => {
            p.addEventListener('click', () => {
                popImg.src = p.querySelector('img').src;
                popText.innerText = p.getAttribute('data-msg');
                overlay.style.display = 'flex';
            });
        });

        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });
    </script>
</body>
</html>
