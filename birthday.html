<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sneha</title>
    <style>
        @font-face { font-family: 'Harmond'; src: url('Harmond Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'Absans'; src: url('Absans Regular.otf') format('opentype'); font-weight: normal; }

        :root {
            --pink-main: #FF6B9D;
            --page-beige: #F5F5DC; /* Beige background */
            --polaroid-brown: #C4A484; /* Richer brown frame */
            --font-heading: 'Harmond', serif;
            --font-body: 'Absans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--page-beige); 
            overflow-x: hidden; 
            font-family: var(--font-body); 
            text-align: center; 
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- CUSTOM HEART-TO-ARROW DRAWING --- */
        .doodle-container {
            width: 250px;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .heart-svg {
            width: 100%;
            height: 100%;
        }

        .path-draw {
            fill: none;
            stroke: var(--pink-main);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: drawPath 4s linear forwards; /* Slower drawing */
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        .scroll-text {
            color: var(--pink-main);
            font-weight: bold;
            letter-spacing: 4px;
            margin-top: -50px;
            animation: fadeIn 2s forwards 3s;
            opacity: 0;
        }

        /* --- TEXT SECTION --- */
        .bday-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 1;
            margin: 40px 0;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .sneha-long { font-size: clamp(1.8rem, 7vw, 3.5rem) !important; }

        .animate-type { animation: type 1.5s steps(25) forwards; }

        /* --- 2x4 POLAROID GRID --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Forced 2x4 grid */
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 30px auto;
        }

        .polaroid {
            background: var(--polaroid-brown);
            padding: 10px 10px 30px 10px; /* Polaroid bottom spacing */
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.3s ease;
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .polaroid.show { 
            animation: fadeInSlow 1.8s ease forwards; 
        }

        /* --- POPUP WITH FRAME --- */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-polaroid-frame {
            background: var(--polaroid-brown);
            padding: 15px 15px 50px 15px;
            max-width: 85%;
            position: relative;
            animation: minimalFade 0.4s ease-out;
        }

        #popup-img {
            max-width: 100%;
            max-height: 60vh;
            display: block;
        }

        #popup-text {
            font-family: var(--font-body);
            font-size: 1.1rem;
            margin-top: 15px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-next {
            margin: 50px 0;
            background: var(--pink-main);
            color: white;
            padding: 18px 70px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        @keyframes type { from { width: 0; } to { width: 100%; } }
        @keyframes fadeInSlow { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes minimalFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="section">
        <div class="doodle-container">
            <svg class="heart-svg" viewBox="0 0 100 150">
                <path class="path-draw" d="M30,40 C10,20 10,60 50,85 C90,60 90,20 70,40 C50,60 50,85 50,140 M40,130 L50,140 L60,130" />
            </svg>
            <p class="scroll-text">SCROLL DOWN</p>
        </div>
    </div>

    <div class="section" id="wish-section">
        <h1 class="bday-text">
            <span id="l1">Happy</span>
            <span id="l2">Birthday</span>
            <span id="l3" class="sneha-long">Snehaaaaaaaaaaaaaaaaaaaa</span>
        </h1>

        <img src="cake.jpg" alt="Cake" style="width: 200px; border-radius: 10px; margin-bottom: 40px;">

        <div class="gallery-container">
            <div class="polaroid" data-msg="“She’s not just pretty, she’s my peace.”"><img src="snehap1.JPEG"></div>
            <div class="polaroid" data-msg="“In a world full of trends, she’s my forever.”"><img src="snehap2.JPEG"></div>
            <div class="polaroid" data-msg="“Her smile >>> everything.”"><img src="snehap3.jpg"></div>
            <div class="polaroid" data-msg="“Lucky? No. Blessed.”"><img src="snehap4.jpg"></div>
            <div class="polaroid" data-msg="“She walked in, and suddenly life made sense.”"><img src="snehap5.jpg"></div>
            <div class="polaroid" data-msg="“Soft heart. Strong soul. My girl.”"><img src="snehap6.jpeg"></div>
            <div class="polaroid" data-msg="“Every love song finally has a face.”"><img src="snehap7.jpeg"></div>
            <div class="polaroid" data-msg="“Mine. Always.” ❤️"><img src="snehap8.jpeg"></div>
        </div>

        <a href="story.html" class="btn-next">NEXT</a>
        <p style="margin-top: 10px; color: #888; font-size: 0.8rem;">click here *</p>
    </div>

    <div id="popup-overlay">
        <div class="popup-polaroid-frame">
            <img id="popup-img" src="">
            <p id="popup-text"></p>
        </div>
    </div>

    <script>
        // Intersection Observer to trigger slow animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.getElementById('l1').classList.add('animate-type');
                    setTimeout(() => document.getElementById('l2').classList.add('animate-type'), 1500);
                    setTimeout(() => document.getElementById('l3').classList.add('animate-type'), 3000);
                    
                    document.querySelectorAll('.polaroid').forEach((p, i) => {
                        // Slower staggered entry
                        setTimeout(() => p.classList.add('show'), 4500 + (i * 500)); 
                    });
                }
            });
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('wish-section'));

        // Popup Logic including the Frame
        const overlay = document.getElementById('popup-overlay');
        const popImg = document.getElementById('popup-img');
        const popText = document.getElementById('popup-text');

        document.querySelectorAll('.polaroid').forEach(p => {
            p.addEventListener('click', () => {
                popImg.src = p.querySelector('img').src;
                popText.innerText = p.getAttribute('data-msg');
                overlay.style.display = 'flex';
            });
        });

        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });
    </script>
</body>
</html>
