<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Heart Tree</title>
    <style>
        @font-face { font-family: 'Harmond'; src: url('Harmond Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'Absans'; src: url('Absans Regular.otf') format('opentype'); font-weight: normal; }

        :root {
            --pink-1: #FF6B9D; --pink-2: #FFB7CE; --pink-3: #D81B60;
            --font-heading: 'Harmond', serif;
            --font-body: 'Absans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff; overflow-x: hidden; font-family: var(--font-body); }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* --- THE TREE --- */
        #tree-wrapper { 
            position: relative; 
            width: 300px; 
            height: 400px; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        
        #hearts-container {
            position: absolute;
            width: 300px;
            height: 300px;
            bottom: 120px; /* Positions hearts ON TOP of the branches */
            pointer-events: none;
        }

        .stem-svg { z-index: 5; margin-bottom: 20px; }

        .stem {
            fill: none; stroke: #4E342E; stroke-width: 5; stroke-linecap: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawStem 1s ease-out forwards;
        }

        @keyframes drawStem { to { stroke-dashoffset: 0; } }

        .heart {
            position: absolute;
            animation: pop 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- BIG BIRTHDAY TEXT --- */
        .bday-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .bday-text {
            font-family: var(--font-heading);
            /* Massive font size for mobile impact */
            font-size: 15vw; 
            line-height: 1.1;
            text-align: center;
            margin-bottom: 30px;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .animate-line-1 { animation: typing 0.6s steps(10, end) forwards; }
        .animate-line-2 { animation: typing 0.6s steps(10, end) forwards 0.6s; }
        .animate-line-3 { animation: typing 0.6s steps(10, end) forwards 1.2s; }

        .cake-img {
            width: 70vw; /* Larger cake image */
            max-width: 300px;
            height: auto;
            border-radius: 15px;
            opacity: 0;
            transform: translateY(20px);
        }

        .show-cake { animation: slideUp 1s ease forwards 1.8s; }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .btn-next {
            background: var(--pink-1);
            color: #fff;
            padding: 20px 80px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="section">
        <div id="tree-wrapper">
            <div id="hearts-container"></div>
            <svg class="stem-svg" viewBox="0 0 200 200" width="250">
                <path class="stem" d="M100,200 L100,80 M100,160 L140,120 M100,140 L60,100 M100,110 L130,70 M100,100 L70,60" />
            </svg>
        </div>
        <p style="margin-top: 20px; letter-spacing: 8px; color: var(--pink-1); font-weight: bold;">SCROLL</p>
    </div>

    <div class="section" id="bday-section">
        <div class="bday-container">
            <h1 class="bday-text">
                <span id="l1">Happy</span>
                <span id="l2">Birthday</span>
                <span id="l3">Sneha</span>
            </h1>
            
            <img src="cake.jpg" alt="Cake" class="cake-img" id="cake-photo">
            
            <a href="gallery.html" class="btn-next">NEXT</a>
            <p style="font-size: 0.9rem; color: #999; margin-top: 15px;">click here *</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('hearts-container');
        const colors = ['#FF6B9D', '#FFB7CE', '#D81B60'];
        
        function createHearts() {
            // Reduced to 400 for better mobile performance and a cleaner "bush" look
            for(let i=0; i<400; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤';
                    heart.style.color = colors[Math.floor(Math.random() * 3)];
                    
                    // CIRCULAR CLUSTER MATH
                    const radius = 120; // Size of the tree head
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.sqrt(Math.random()) * radius;
                    
                    // Centered within the hearts-container
                    const x = Math.cos(angle) * dist + 150; 
                    const y = Math.sin(angle) * dist + 150; 
                    
                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                    heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    container.appendChild(heart);
                }, i * 2);
            }
        }

        setTimeout(createHearts, 800);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    document.getElementById('l1').classList.add('animate-line-1');
                    document.getElementById('l2').classList.add('animate-line-2');
                    document.getElementById('l3').classList.add('animate-line-3');
                    document.getElementById('cake-photo').classList.add('show-cake');
                }
            });
        }, { threshold: 0.3 });

        observer.observe(document.getElementById('bday-section'));
    </script>
</body>
</html>
