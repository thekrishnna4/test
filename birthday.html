<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Heart Tree</title>
    <style>
        @font-face { font-family: 'Harmond'; src: url('Harmond Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'Absans'; src: url('Absans Regular.otf') format('opentype'); font-weight: normal; }

        :root {
            --pink-1: #FF6B9D; --pink-2: #FFB7CE; --pink-3: #D81B60;
            --font-heading: 'Harmond', serif;
            --font-body: 'Absans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff; overflow-x: hidden; font-family: var(--font-body); }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- THE TREE STRUCTURE --- */
        #tree-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Keeps trunk at bottom */
        }

        #hearts-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10; /* Hearts sit OVER the branches */
            pointer-events: none;
        }

        .stem-svg {
            width: 280px;
            height: auto;
            z-index: 5;
            margin-bottom: 20px;
        }

        .stem {
            fill: none; stroke: #4E342E; stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawStem 1s ease-out forwards;
        }

        @keyframes drawStem { to { stroke-dashoffset: 0; } }

        .heart {
            position: absolute;
            animation: pop 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- GIANT BIRTHDAY TEXT --- */
        .bday-container {
            width: 100%;
            text-align: center;
            padding-top: 50px;
        }

        .bday-text {
            font-family: var(--font-heading);
            font-size: 18vw; /* Massive size */
            line-height: 0.9;
            color: var(--text-black);
            margin-bottom: 40px;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .animate-l1 { animation: type 0.6s steps(10) forwards; }
        .animate-l2 { animation: type 0.6s steps(10) forwards 0.6s; }
        .animate-l3 { animation: type 0.6s steps(10) forwards 1.2s; }

        @keyframes type { from { width: 0; } to { width: 100%; } }

        .cake-photo {
            width: 85vw;
            max-width: 350px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255,107,157,0.2);
            opacity: 0;
            transform: scale(0.9);
        }

        .show-cake { animation: cakeIn 0.8s ease forwards 1.8s; }
        @keyframes cakeIn { to { opacity: 1; transform: scale(1); } }

        .btn-next {
            display: inline-block;
            background: var(--pink-1);
            color: #fff;
            padding: 22px 90px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 50px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="section">
        <div id="tree-container">
            <div id="hearts-canvas"></div>
            <svg class="stem-svg" viewBox="0 0 200 200">
                <path class="stem" d="M100,200 L100,80 M100,160 L140,120 M100,140 L60,105 M100,115 L130,75 M100,105 L70,65" />
            </svg>
        </div>
        <p style="margin-top: 30px; letter-spacing: 10px; color: var(--pink-1); font-weight: 800;">SCROLL</p>
    </div>

    <div class="section" id="bday-trigger">
        <div class="bday-container">
            <h1 class="bday-text">
                <span id="line1">Happy</span>
                <span id="line2">Birthday</span>
                <span id="line3">Snehaaaaaaaaaaaaaaaaaaaa</span>
            </h1>
            
            <img src="cake.jpg" alt="Cake" class="cake-photo" id="cake">
            
            <a href="gallery.html" class="btn-next">NEXT</a>
            <p style="margin-top: 15px; color: #bbb; font-size: 0.9rem;">click here *</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hearts-canvas');
        const colors = ['#FF6B9D', '#FFB7CE', '#D81B60'];
        
        function growTree() {
            for(let i=0; i<500; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤';
                    heart.style.color = colors[Math.floor(Math.random() * 3)];
                    
                    // TREE MATH: The "Oval Bush" Look
                    const centerX = canvas.offsetWidth / 2;
                    const centerY = 140; // Height where hearts cluster
                    
                    const angle = Math.random() * Math.PI * 2;
                    const radiusX = Math.random() * 130; // Width of canopy
                    const radiusY = Math.random() * 110; // Height of canopy
                    
                    const x = centerX + Math.cos(angle) * radiusX;
                    const y = centerY + Math.sin(angle) * radiusY;
                    
                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                    heart.style.fontSize = (Math.random() * 22 + 8) + 'px';
                    canvas.appendChild(heart);
                }, i * 2);
            }
        }

        setTimeout(growTree, 600);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    document.getElementById('line1').classList.add('animate-l1');
                    document.getElementById('line2').classList.add('animate-l2');
                    document.getElementById('line3').classList.add('animate-l3');
                    document.getElementById('cake').classList.add('show-cake');
                }
            });
        }, { threshold: 0.4 });

        observer.observe(document.getElementById('bday-trigger'));
    </script>
</body>
</html>
