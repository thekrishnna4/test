<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sneha</title>
    <style>
        @font-face { font-family: 'Harmond'; src: url('Harmond Bold.otf') format('opentype'); font-weight: bold; }
        @font-face { font-family: 'Absans'; src: url('Absans Regular.otf') format('opentype'); font-weight: normal; }

        :root {
            --pink-main: #FF6B9D;
            --polaroid-tan: #f4ece1; /* Light brown/tan frame */
            --font-heading: 'Harmond', serif;
            --font-body: 'Absans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff; overflow-x: hidden; font-family: var(--font-body); text-align: center; }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- DOODLE HEART DRAWING --- */
        .heart-draw-container {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }

        .heart-path {
            stroke: var(--pink-main);
            stroke-width: 3;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawHeart 3s ease-in-out forwards;
        }

        @keyframes drawHeart {
            to { stroke-dashoffset: 0; }
        }

        .scroll-arrow {
            color: var(--pink-main);
            font-size: 2rem;
            animation: bounce 2s infinite;
            margin-top: 10px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(5px); }
        }

        /* --- TEXT SECTION --- */
        .bday-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 1;
            margin-bottom: 50px;
        }

        .bday-text span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .sneha-long { font-size: clamp(1.8rem, 8vw, 4rem) !important; }

        .animate-type { animation: type 1.2s steps(20) forwards; }

        /* --- POLAROID GALLERY --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            margin-top: 40px;
        }

        .polaroid {
            background: var(--polaroid-tan);
            padding: 15px 15px 40px 15px; /* Extra bottom padding for Polaroid look */
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.4s ease;
            opacity: 0;
            transform: translateY(50px);
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .polaroid.show { 
            /* Slower, smoother photo appearance */
            animation: fadeInSlow 1.5s ease forwards; 
        }

        @keyframes fadeInSlow {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- POPUP --- */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); /* Minimal light background */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .popup-inner {
            max-width: 85%;
            animation: simplePop 0.3s ease-out;
        }

        #popup-text {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-top: 20px;
            color: #333;
        }

        @keyframes simplePop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-next {
            margin-top: 60px;
            background: var(--pink-main);
            color: white;
            padding: 20px 80px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        @keyframes type { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body>

    <div class="section">
        <div class="heart-draw-container">
            <svg viewBox="0 0 100 100">
                <path class="heart-path" d="M50,30 C35,10 10,25 10,45 C10,65 35,85 50,90 C65,85 90,65 90,45 C90,25 65,10 50,30" />
            </svg>
        </div>
        <div class="scroll-arrow">↓</div>
    </div>

    <div class="section" id="wish-section">
        <h1 class="bday-text">
            <span id="l1">Happy</span>
            <span id="l2">Birthday</span>
            <span id="l3" class="sneha-long">Snehaaaaaaaaaaaaaaaaaaaa</span>
        </h1>

        <img src="cake.jpg" alt="Cake" style="width: 250px; border-radius: 10px; margin-bottom: 50px;">

        <div class="gallery-container">
            <div class="polaroid" data-msg="“She’s not just pretty, she’s my peace.”"><img src="snehap1.JPEG"></div>
            <div class="polaroid" data-msg="““Her smile >>> everything.”"><img src="snehap2.JPEG"></div>
            <div class="polaroid" data-msg="In a world full of trends, she’s my forever.”"><img src="snehap3.jpg"></div>
            <div class="polaroid" data-msg="“Lucky? No. Blessed.”"><img src="snehap4.jpg"></div>
            <div class="polaroid" data-msg="“She walked in, and suddenly life made sense.”"><img src="snehap5.jpg"></div>
            <div class="polaroid" data-msg="“Soft heart. Strong soul. My girl.”"><img src="snehap6.jpeg"></div>
            <div class="polaroid" data-msg="“Every love song finally has a face.”"><img src="snehap7.jpeg"></div>
            <div class="polaroid" data-msg="“Mine. Always.” ❤️"><img src="snehap8.jpeg"></div>
        </div>

        <a href="story.html" class="btn-next">NEXT</a>
        <p style="margin-top: 15px; color: #999; font-size: 0.8rem;">click here *</p>
    </div>

    <div id="popup-overlay">
        <div class="popup-inner">
            <img id="popup-img" src="" style="width: 100%; max-height: 70vh; object-fit: contain;">
            <p id="popup-text"></p>
        </div>
    </div>

    <script>
        // Scroll Logic for Typing and Photos
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.getElementById('l1').classList.add('animate-type');
                    setTimeout(() => document.getElementById('l2').classList.add('animate-type'), 1200);
                    setTimeout(() => document.getElementById('l3').classList.add('animate-type'), 2400);
                    
                    document.querySelectorAll('.polaroid').forEach((p, i) => {
                        setTimeout(() => p.classList.add('show'), 3500 + (i * 400)); // Much slower appearance
                    });
                }
            });
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('wish-section'));

        // Popup Logic
        const overlay = document.getElementById('popup-overlay');
        const popImg = document.getElementById('popup-img');
        const popText = document.getElementById('popup-text');

        document.querySelectorAll('.polaroid').forEach(p => {
            p.addEventListener('click', () => {
                popImg.src = p.querySelector('img').src;
                popText.innerText = p.getAttribute('data-msg');
                overlay.style.display = 'flex';
            });
        });

        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });
    </script>
</body>
</html>
