<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    
    <script src="file/jquery.min.js"></script>
    <script src="file/jscex.min.js"></script>
    <script src="file/jscex-parser.js"></script>
    <script src="file/jscex-jit.js"></script>
    <script src="file/jscex-builderbase.min.js"></script>
    <script src="file/jscex-async.min.js"></script>
    <script src="file/jscex-async-powerpack.min.js"></script>
    <script src="file/functions.js"></script>
    <script src="file/love.js"></script>

    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --pink-1: #FF6B9D;
            --page-beige: #F5F5DC;
            --polaroid-brown: #C4A484;
        }

        body { background-color: var(--page-beige); margin: 0; font-family: 'Absans Regular', sans-serif; text-align: center; overflow-x: hidden; }

        /* --- TREE SECTION --- */
        #main { width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #mobile-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; }
        #canvas-wrapper { position: relative; width: 1100px; height: 680px; transform: scale(1.1); transform-origin: center; }
        
        .tree-msg { color: var(--pink-1); font-weight: bold; font-size: 1.5rem; position: absolute; top: 15%; width: 100%; z-index: 10; text-transform: uppercase; }
        #scroll-hint { color: var(--pink-1); font-weight: bold; display: none; letter-spacing: 5px; animation: bounce 2s infinite; position: absolute; bottom: 5%; width: 100%; z-index: 10; }

        /* --- BIRTHDAY CONTENT --- */
        .content-section { padding: 40px 10px 120px 10px; display: none; }
        .bday-title { font-family: 'Harmond Bold'; font-size: clamp(3rem, 18vw, 7.5rem); margin: 60px 0 20px 0; line-height: 0.9; }
        .bday-title span { display: block; overflow: hidden; white-space: nowrap; width: 0; margin: 0 auto; }
        .animate-type { animation: type 1s steps(30) forwards; }
        .line-long { font-size: 0.4em; letter-spacing: 1px; color: var(--pink-1); margin-top: 20px; }

        .cake-img { width: 300px; border-radius: 20px; margin: 40px 0; border: 10px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

        /* --- RESTORED INSTRUCTION BOX --- */
        .instruction-box {
            background: #fff; padding: 20px; border-radius: 10px; margin: 40px auto; 
            max-width: 450px; border: 2px solid var(--pink-1);
        }
        .instruction-box h3 { font-family: 'Harmond Bold'; color: #333; margin-bottom: 5px; }
        .instruction-box p { color: #666; font-size: 0.9rem; margin: 0; }

        /* --- GRID & POLAROIDS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 650px; margin: 40px auto; }
        .polaroid { background: var(--polaroid-brown); padding: 10px 10px 30px 10px; cursor: pointer; transition: 0.3s; }
        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* --- RECTANGLE NEXT BUTTON --- */
        .btn-container { margin-top: 80px; }
        .btn-next {
            display: inline-block; 
            background: var(--pink-1); 
            color: white;
            padding: 20px 100px; /* Wider for rectangle look */
            border-radius: 0; /* REMOVED ROUNDED CORNERS */
            text-decoration: none;
            font-weight: bold; 
            font-size: 1.5rem; 
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.3);
            border: 2px solid var(--pink-1);
        }
        .btn-next:hover { background: transparent; color: var(--pink-1); }
        .sub-btn-text { display: block; margin-top: 20px; font-size: 1rem; color: #777; font-style: italic; }

        /* --- BLURRY POPUP --- */
        #popup { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(245, 245, 220, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            display:none; justify-content:center; align-items:center; z-index:2000; flex-direction: column; 
        }
        .popup-box { background: var(--polaroid-brown); padding: 15px 15px 20px 15px; max-width: 85%; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        #popup-img { max-width: 100%; max-height: 60vh; display: block; }
        #popup-caption { color: #3d2b1f; background: #fff; margin-top: 10px; padding: 15px; font-weight: bold; font-size: 1.1rem; }

        @keyframes type { from { width: 0; } to { width: 100%; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 768px) { 
            #canvas-wrapper { transform: scale(0.38); margin-top: -50px; } 
            .cake-img { width: 250px; }
            .btn-next { padding: 15px 60px; width: 70%; }
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop><source src="song.mp3" type="audio/mp3"></audio>

    <div id="main">
        <div id="mobile-trigger"></div>
        <div class="tree-msg" id="msg">TAP ANYWHERE TO START</div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
        <div id="scroll-hint">KEEP SCROLLING ↓</div>
    </div>

    <div class="content-section" id="wish-section">
        <h1 class="bday-title">
            <span id="t1">Happy</span>
            <span id="t2">Birthday</span>
            <span id="t3" class="line-long">Snehaaaaaaaaaaaaaaaaaaaa</span>
        </h1>

        <img src="cake.jpg" class="cake-img">

        <div class="instruction-box">
            <h3>there is a message for you</h3>
            <p>tap on photos to reveal them</p>
        </div>
        
        <div class="grid">
            <div class="polaroid" onclick="openMe(this)" data-cap="You are my favorite person. ❤️"><img src="snehap1.JPEG"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="My peace in this chaotic world."><img src="snehap2.JPEG"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="That smile? Forever my favorite view."><img src="snehap3.jpg"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="Blessed to have you by my side."><img src="snehap4.jpg"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="Making memories with you is my favorite thing."><img src="snehap5.jpg"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="Soft heart, strong soul. That's you."><img src="snehap6.jpeg"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="The face behind every love song."><img src="snehap7.jpeg"></div>
            <div class="polaroid" onclick="openMe(this)" data-cap="Always and forever, mine."><img src="snehap8.jpeg"></div>
        </div>

        <div class="btn-container">
            <a href="story.html" class="btn-next">Next</a>
            <span class="sub-btn-text">there is something more for you</span>
        </div>
    </div>

    <div id="popup" onclick="this.style.display='none'">
        <div class="popup-box">
            <img id="popup-img">
            <div id="popup-caption"></div>
        </div>
    </div>

    <script>
        function openMe(el) { 
            $('#popup-img').attr('src', $(el).find('img').attr('src'));
            $('#popup-caption').text($(el).attr('data-cap'));
            $('#popup').css('display', 'flex'); 
        }

        (function(){
            var canvas = $('#canvas');
            var width = canvas.width(), height = canvas.height();
            
            var tree = new Tree(canvas[0], width, height, {
                seed: { x: width / 2 - 20, color: "rgb(190, 26, 37)", scale: 4 }, 
                branch: [[535, 680, 570, 250, 500, 200, 30, 100, [[540, 500, 455, 417, 340, 400, 13, 100, [[450, 435, 434, 430, 394, 395, 2, 40]]],[550, 445, 600, 356, 680, 345, 12, 100, [[578, 400, 648, 409, 661, 426, 3, 80]]]]]],
                bloom: { num: 700, width: 1080, height: 650 },
                footer: { width: 1200, height: 5, speed: 10 }
            });

            var seed = tree.seed, hold = 1;

            $('#mobile-trigger').on('click touchstart', function() {
                if (hold) {
                    hold = 0;
                    document.getElementById('myAudio').play();
                    $('#msg').fadeOut();
                    $(this).hide(); 
                    setTimeout(() => { 
                        $('#scroll-hint').fadeIn(); 
                        $('#wish-section').show();
                        $('#t1').addClass('animate-type');
                        setTimeout(()=> $('#t2').addClass('animate-type'), 1000);
                        setTimeout(()=> $('#t3').addClass('animate-type'), 2000);
                    }, 6500);
                }
            });

            var runAsync = eval(Jscex.compile("async", function () {
                seed.draw();
                while (hold) { $await(Jscex.Async.sleep(10)); }
                while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); }
                while (seed.canMove()) { seed.move(0, 2); $await(Jscex.Async.sleep(10)); }
                do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow());
                do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower());
            }));
            runAsync().start();
        })();
    </script>
</body>
</html>
