<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Letter for Sneha</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --paper: #ffffff;
            --pink: #FF6B9D;
            --brown: #5D4037;
            --bg: #F5F5DC;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body {
            background-color: var(--bg);
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Stop all scrolling */
            font-family: 'Absans Regular', sans-serif;
            background-image: radial-gradient(#d1d1b3 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        /* --- THE ENVELOPE --- */
        #main-view {
            transition: 0.6s ease-in-out;
            display: flex; flex-direction: column; align-items: center;
        }

        .envelope-wrapper {
            position: relative; width: 280px; height: 180px;
            background: #fff; border: 2.5px solid var(--brown);
            box-shadow: 6px 6px 0px var(--brown);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .envelope-wrapper:hover { transform: scale(1.03); box-shadow: 8px 8px 0px var(--brown); }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-top: 90px solid #f0f0f0; 
            transform-origin: top; z-index: 20; transition: 0.6s ease-out;
        }

        .hint {
            position: absolute; top: -35px; width: 100%; text-align: center;
            color: var(--pink); font-family: 'Harmond Bold'; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- THE LETTER OVERLAY --- */
        .letter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(245, 245, 220, 0.6); /* Use soft overlay for contrast */
            z-index: 100; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        /* --- THE LETTER PAPER --- */
        .letter-paper {
            width: 100%; max-width: 360px;
            background: var(--paper);
            padding: 40px 25px;
            border-top: 2px solid var(--brown);
            border-bottom: 2px solid var(--brown);
            
            /* Add Left and Right Borders for stationery definition */
            border-left: 2px solid var(--brown);
            border-right: 2px solid var(--brown);
            
            /* Simplified shadow - removed the bright pink upper shadow */
            box-shadow: 10px 10px 0px var(--brown);
            
            position: relative; overflow-y: hidden;
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s 0.3s ease-out;
        }

        /* --- Text Styling --- */
        .dear { font-family: 'Harmond Bold'; font-size: 1.8rem; color: var(--pink); margin-bottom: 20px; }
        .message { font-family: 'Absans Regular', sans-serif; font-size: 1rem; color: var(--brown); line-height: 1.6; text-align: left; margin: 0; }
        .from { font-family: 'Harmond Bold'; text-align: right; margin-top: 35px; font-size: 1.2rem; color: var(--pink); }

        /* --- UI CONTROLS --- */
        .controls {
            margin-top: 40px; display: flex; gap: 20px; align-items: center;
            opacity: 0; transition: 0.6s 0.4s ease;
        }

        .btn-ui {
            text-decoration: none; color: var(--brown); font-weight: bold;
            font-size: 0.8rem; border-bottom: 2px solid var(--pink);
            background: none; border-top: none; border-left: none; border-right: none;
            cursor: pointer; padding: 5px 0; font-family: 'Absans Regular', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-ui:active { transform: scale(0.95); opacity: 0.7; }

        /* ANIMATION STATES */
        .open-anim .flap { transform: rotateX(180deg); }
        .open-anim #main-view { opacity: 0; pointer-events: none; }
        .open-anim .letter-paper { opacity: 1; transform: translateY(0); }
        .open-anim .controls { opacity: 1; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="hint">TAP TO OPEN</div>
        <div class="envelope-wrapper" onclick="openLetter()">
            <div class="flap"></div>
            <div style="position:absolute; bottom:12px; right:12px; font-size:1.6rem;">💌</div>
        </div>
    </div>

    <div id="letter-view" class="letter-overlay">
        <div class="letter-paper">
            <div class="dear">Dear Sneha,</div>
            <p class="message">
                From our days at Mathura Cantt to the long distance we navigate now, you remain my favorite person. This playlist is just a small piece of the love I have for you. 
                <br><br>
                You are my home, no matter the distance. Happy Birthday, beautiful.
            </p>
            <div class="from">— Forever yours</div>
        </div>

        <div class="controls">
            <button class="btn-ui" onclick="closeLetter()">✕ Close Letter</button>
            <a href="playlist.html" class="btn-ui">← Back to Music</a>
        </div>
    </div>

    <script>
        const bodyEl = document.body;
        const letterView = document.getElementById('letter-view');

        function openLetter() {
            bodyEl.classList.add('open-anim');
            // Slight delay before enabling the letter full screen
            setTimeout(() => {
                letterView.style.display = 'flex';
            }, 600);
        }

        function closeLetter() {
            bodyEl.classList.remove('open-anim');
            letterView.style.display = 'none';
        }
    </script>
</body>
</html>
