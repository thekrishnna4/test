<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Letter for Sneha</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Dancing+Script:wght@600&display=swap');

        :root {
            --paper: #fffef0;
            --envelope: #ffffff;
            --pink: #FF6B9D;
            --brown: #5D4037;
        }

        body {
            background-color: #F5F5DC;
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Stops all scrolling */
            font-family: sans-serif;
        }

        /* --- THE ENVELOPE --- */
        .envelope-wrapper {
            position: relative; width: 320px; height: 220px;
            background: var(--envelope); border: 2px solid var(--brown);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer; z-index: 10; transition: 0.5s;
        }

        /* Realistic Flap */
        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 160px solid transparent; border-right: 160px solid transparent;
            border-top: 110px solid #f0f0f0; border-bottom: 0;
            transform-origin: top; z-index: 20; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The "Tap to Open" Hint */
        .hint {
            position: absolute; top: -40px; width: 100%; text-align: center;
            color: var(--pink); font-family: 'Harmond Bold'; font-size: 0.8rem;
            letter-spacing: 2px; animation: bounce 2s infinite;
        }

        /* --- THE LETTER (Stationery Style) --- */
        .letter {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0.4);
            width: 85vw; height: 80vh; /* Scaled for mobile screen */
            background: var(--paper); border: 1px solid #e0e0e0;
            padding: 40px 25px; box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            opacity: 0; z-index: 5; transition: 0.7s 0.3s;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Handwritten Styles */
        .dear { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--pink); margin-bottom: 20px; }
        .message { 
            font-family: 'Caveat', cursive; font-size: 1.4rem; 
            color: var(--brown); line-height: 1.4; margin: 0;
        }
        .from { font-family: 'Dancing Script', cursive; text-align: right; margin-top: 30px; font-size: 1.6rem; color: var(--pink); }

        /* OPEN STATE */
        .open .flap { transform: rotateX(180deg); z-index: 1; }
        .open .envelope-wrapper { transform: translateY(120%); opacity: 0; pointer-events: none; }
        .open .letter { transform: translate(-50%, -50%) scale(1); opacity: 1; z-index: 100; }
        .open .hint { display: none; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .back-link {
            position: fixed; bottom: 20px; text-decoration: none;
            color: var(--brown); font-size: 0.8rem; border-bottom: 1px solid var(--pink);
            z-index: 200;
        }
    </style>
</head>
<body id="body">

    <div class="hint">TAP TO OPEN</div>
    
    <div class="envelope-wrapper" onclick="openMe()">
        <div class="flap"></div>
        <div style="position:absolute; bottom:10px; right:10px; font-size:2rem;">💌</div>
    </div>

    <div class="letter">
        <div class="dear">Dear Sneha,</div>
        <p class="message">
            From our days at Mathura Cantt to the distance we navigate now, you remain my favorite person. This playlist is just a small piece of the love I have for you. <br><br>
            You are my home, no matter where we are. Happy Birthday, beautiful.
        </p>
        <div class="from">— Forever yours</div>
    </div>

    <a href="playlist.html" class="back-link">← Back to Songs</a>

    <script>
        function openMe() {
            document.getElementById('body').classList.add('open');
        }
    </script>
</body>
</html>
