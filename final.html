<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Letter for Sneha</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --paper: #ffffff;
            --pink: #FF6B9D;
            --brown: #5D4037;
            --bg: #F5F5DC;
        }

        body {
            background-color: var(--bg);
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Absans Regular', sans-serif; /* Minimalist Body Font */
        }

        /* --- ENVELOPE --- */
        .envelope-wrapper {
            position: relative; width: 280px; height: 180px;
            background: #fff; border: 2px solid var(--brown);
            box-shadow: 8px 8px 0px var(--brown);
            cursor: pointer; transition: 0.4s; z-index: 10;
        }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-top: 90px solid #f9f9f9; 
            transform-origin: top; z-index: 20; transition: 0.6s ease;
        }

        .hint {
            position: absolute; top: -30px; width: 100%; text-align: center;
            color: var(--pink); font-family: 'Harmond Bold'; font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* --- THE LETTER --- */
        .letter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; 
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px; box-sizing: border-box;
        }

        .letter-paper {
            width: 100%; max-width: 350px; background: var(--paper);
            padding: 40px 25px; border: 2px solid var(--brown);
            box-shadow: 10px 10px 0px var(--pink);
        }

        .dear { 
            font-family: 'Harmond Bold'; font-size: 1.8rem; 
            color: var(--pink); margin-bottom: 20px; 
        }

        .message { 
            font-family: 'Absans Regular', sans-serif; font-size: 1rem; 
            color: var(--brown); line-height: 1.6; margin: 0;
            text-align: left; letter-spacing: 0.3px;
        }

        .from { 
            font-family: 'Harmond Bold'; text-align: right; 
            margin-top: 30px; font-size: 1.2rem; color: var(--pink); 
        }

        /* --- BUTTONS --- */
        .controls {
            margin-top: 40px; display: flex; gap: 20px; align-items: center;
        }

        .btn-ui {
            text-decoration: none; color: var(--brown); font-weight: bold;
            font-size: 0.8rem; border-bottom: 2px solid var(--pink);
            background: none; border-top: none; border-left: none; border-right: none;
            cursor: pointer; padding: 5px 0; font-family: 'Absans Regular';
        }

        /* ANIMATION CLASSES */
        .open-anim .flap { transform: rotateX(180deg); }
        .open-anim .envelope-wrapper { transform: scale(0.8); opacity: 0; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="hint">TAP TO OPEN</div>
        <div class="envelope-wrapper" onclick="openLetter()">
            <div class="flap"></div>
            <div style="position:absolute; bottom:10px; right:10px; font-size:1.5rem;">💌</div>
        </div>
    </div>

    <div id="letter-view" class="letter-overlay">
        <div class="letter-paper">
            <div class="dear">Dear Sneha,</div>
            <p class="message">
                From our days at Mathura Cantt to the long distance we navigate now, you remain my favorite person. This playlist is just a small piece of the love I have for you. 
                <br><br>
                You are my home, no matter the distance. Happy Birthday, beautiful.
            </p>
            <div class="from">— Forever yours</div>
        </div>

        <div class="controls">
            <button class="btn-ui" onclick="closeLetter()">✕ Close Letter</button>
            <a href="playlist.html" class="btn-ui">← Back to Music</a>
        </div>
    </div>

    <script>
        function openLetter() {
            const main = document.getElementById('main-view');
            main.classList.add('open-anim');
            
            setTimeout(() => {
                document.getElementById('letter-view').style.display = 'flex';
            }, 600);
        }

        function closeLetter() {
            const main = document.getElementById('main-view');
            main.classList.remove('open-anim');
            document.getElementById('letter-view').style.display = 'none';
        }
    </script>
</body>
</html>
