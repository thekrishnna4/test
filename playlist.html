<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneh-ify</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --page-beige: #F5F5DC;
            --pink-accent: #FF6B9D;
            --doodle-brown: #5D4037;
        }

        body {
            background-color: var(--page-beige);
            color: var(--doodle-brown);
            font-family: 'Absans Regular', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: radial-gradient(#d1d1b3 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .header { padding: 50px 20px 30px; text-align: left; border-bottom: 2px solid var(--doodle-brown); }
        .header h1 { font-family: 'Harmond Bold'; font-size: 2.2rem; margin: 0; color: var(--pink-accent); }
        .header p { opacity: 0.8; font-size: 0.9rem; margin: 8px 0; }
        .header .magic-text { font-size: 0.8rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .track-list { padding: 15px; }
        .track-item {
            display: flex; align-items: center;
            padding: 12px; margin-bottom: 12px;
            border-radius: 12px; background: #fff;
            border: 2px solid var(--doodle-brown);
            box-shadow: 4px 4px 0px var(--doodle-brown);
            cursor: pointer; transition: all 0.2s ease;
        }
        .track-item:active { scale: 0.97; box-shadow: 1px 1px 0px var(--doodle-brown); }
        .thumb { width: 55px; height: 55px; border-radius: 6px; margin-right: 15px; object-fit: cover; border: 1px solid #eee; }
        .info h3 { font-size: 1.1rem; margin: 0; }
        .info p { font-size: 0.85rem; opacity: 0.7; margin: 4px 0 0 0; font-style: italic; }

        #player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245, 245, 220, 0.85); z-index: 1000;
            display: none; flex-direction: column;
            backdrop-filter: blur(25px);
            padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        .player-top-row { display: flex; align-items: center; margin-top: 40px; margin-bottom: 20px; }
        .vinyl-wrap { width: 60px; height: 60px; margin-right: 15px; }
        .record {
            width: 100%; height: 100%; background: #222;
            border-radius: 50%; border: 3px solid #444;
            display: flex; align-items: center; justify-content: center;
            animation: spin 6s linear infinite;
        }
        .record-label { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .player-title { font-family: 'Harmond Bold'; font-size: 1.4rem; color: var(--pink-accent); }

        .swiper { width: 100%; height: 45vh; margin-bottom: 15px; }
        .swiper-slide { width: 75%; height: 100%; }
        .swiper-slide img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 15px; border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .note-container {
            width: 100%; padding: 20px; margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px; border: 2px solid var(--doodle-brown);
            box-shadow: 4px 4px 0px var(--doodle-brown);
            text-align: center;
        }
        .note-container p { font-size: 0.95rem; line-height: 1.5; font-style: italic; color: var(--doodle-brown); margin: 0; }
        .close-icon { position: absolute; top: 25px; right: 20px; font-size: 2rem; color: var(--doodle-brown); cursor: pointer; }

        .btn-main-final {
            background: var(--pink-accent); color: white; padding: 15px 40px; font-weight: bold;
            text-decoration: none; border-radius: 10px; border: 2px solid var(--doodle-brown);
            box-shadow: 4px 4px 0px var(--doodle-brown); font-size: 1rem;
            display: block; width: fit-content; margin: 40px auto;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sneh-ify</h1>
        <p>A playlist for my favorite person.</p>
        <span class="magic-text">Tap the songs to see the magic↴</span>
    </div>

    <div class="track-list" id="main-track-list"></div>

    <a href="final.html" class="btn-main-final">The Last Surprise</a>

    <div id="player-overlay">
        <div class="close-icon" onclick="exitPlayer()">✕</div>
        <div class="player-top-row">
            <div class="vinyl-wrap"><div class="record"><img id="player-banner" src="" class="record-label"></div></div>
            <div id="player-song-title" class="player-title"></div>
        </div>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="photo-wall"></div>
        </div>
        <div class="note-container"><p id="player-text"></p></div>
        <audio id="audio-engine"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const library = {
            1: { title: "Lae Dooba", banner: "s1b1.png", mp3: "laedooba.mp3", note: "sach me mainu ishq tera lae dooba snehaaa" },
            2: { title: "Rishte Naate", banner: "s2b1.png", mp3: "rishtenaate.mp3", note: "Tu mere liye mera ghar hai sneha saare rishte naato se upar" },
            3: { title: "Do You Know", banner: "s3b1.png", mp3: "doyouknow.mp3", note: "Do you know mai tainu kinna pyaar karda?" },
            4: { title: "Tu Chaiye", banner: "s4b1.png", mp3: "tuchaiye.mp3", note: "Sirf tu chaiye sneha" },
            5: { title: "Mera Yaar", banner: "s5b1.png", mp3: "merayaar.mp3", note: "mai mandir maszid kyun hi jaun tu hi mere liye meri bhagwaan hai" },
            6: { title: "Tujh Me Rab Dikhta Hai", banner: "s6b1.png", mp3: "tujhmerabdikhtahai.mp3", note: "Tujh me rab dikhta hai mai kya karu" },
            7: { title: "In Dino", banner: "s7b1.png", mp3: "indino.mp3", note: "tujh ko chupa kar mai rakh lu kahi sabse dooooooor" },
            8: { title: "Khat", banner: "s8b1.png", mp3: "khat.mp3", note: "tere liye mandir jau bhagwan me naam maan kar bhi bhagwaan se tere liye pray karta hu" },
            9: { title: "Meri Banogi Kya", banner: "s9b1.png", mp3: "meribanogikya.mp3", note: "meri banogi kya meri rahogi kya ?" },
            10: { title: "I Love You", banner: "s10b1.png", mp3: "iloveyou.mp3", note: "i love you sneha" },
            11: { title: "Humsafar", banner: "s11b1.png", mp3: "humsafar.mp3", note: "kya meri humsafar banegi sneha?" },
            12: { title: "Marjaayen", banner: "s12b1.png", mp3: "marjaayen.mp3", note: "ahhhh !!!" }
        };

        const listContainer = document.getElementById('main-track-list');
        Object.keys(library).forEach(id => {
            const song = library[id];
            listContainer.innerHTML += `
                <div class="track-item" onclick="launchPlayer(${id})">
                    <img src="./${song.banner}" class="thumb">
                    <div class="info"><h3>${song.title}</h3><p>Sneha's Special</p></div>
                </div>`;
        });

        const overlay = document.getElementById('player-overlay');
        const player = document.getElementById('audio-engine');
        let swiperInstance = null;

        function launchPlayer(id) {
            const data = library[id];
            player.src = `./${data.mp3}`;
            document.getElementById('player-banner').src = `./${data.banner}`;
            document.getElementById('player-song-title').innerText = data.title;
            document.getElementById('player-text').innerText = data.note;

            const wall = document.getElementById('photo-wall');
            wall.innerHTML = '';
            for(let i=1; i<=5; i++) {
                // FIXED: Using lowercase .jpg to match your repository screenshots
                wall.innerHTML += `<div class="swiper-slide"><img src="./s${id}p${i}.jpg"></div>`;
            }

            overlay.style.display = 'flex';
            player.play();

            if(swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper(".mySwiper", {
                effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true,
                coverflowEffect: { rotate: 15, stretch: 0, depth: 80, modifier: 1, slideShadows: true }
            });
        }

        function exitPlayer() { overlay.style.display = 'none'; player.pause(); }
    </script>
</body>
</html>
