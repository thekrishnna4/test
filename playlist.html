<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneh-ify | Memories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        :root {
            --page-beige: #F5F5DC;
            --pink-accent: #FF6B9D;
            --doodle-brown: #5D4037;
        }

        body {
            background-color: var(--page-beige);
            color: var(--doodle-brown);
            font-family: 'Absans Regular', sans-serif;
            margin: 0; padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        /* --- Rich Background --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .sticker { position: absolute; opacity: 0.15; animation: float 10s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- List View --- */
        .header { padding: 40px 20px; border-bottom: 2px dashed var(--doodle-brown); }
        .track-list { padding: 20px; }
        .track-item {
            display: flex; align-items: center; padding: 15px; margin-bottom: 15px;
            background: #fff; border: 2px solid var(--doodle-brown);
            border-radius: 15px; box-shadow: 4px 4px 0px var(--doodle-brown);
        }

        /* --- Player Overlay (Glass) --- */
        #player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(25px);
            display: none; flex-direction: column; z-index: 1000; padding: 20px;
        }

        /* --- Swiper Fix: Force high performance --- */
        .swiper { width: 100%; height: 45vh; margin: 20px 0; border-radius: 15px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        .swiper-slide img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            border: 10px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }

        .note-box { 
            background: #fff; padding: 20px; border-radius: 15px; 
            border: 2px solid var(--doodle-brown); font-family: 'Caveat', cursive; 
            font-size: 1.5rem; text-align: center;
        }

        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bg-layer">
        <span class="sticker" style="top:10%; left:5%;">🌸</span>
        <span class="sticker" style="top:20%; right:10%;">✨</span>
        <span class="sticker" style="bottom:10%; left:10%;">🧸</span>
        <span class="sticker" style="bottom:30%; right:5%;">💖</span>
    </div>

    <div class="header">
        <h1 style="font-family:'Harmond Bold'; color:var(--pink-accent);">Sneh-ify</h1>
    </div>

    <div class="track-list" id="list"></div>

    <div id="player-overlay">
        <div class="close-btn" onclick="closePlayer()">✕</div>
        <div style="margin-top:40px; font-family:'Harmond Bold'; font-size:1.5rem;" id="p-title"></div>
        
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="p-wall"></div>
        </div>

        <div class="note-box" id="p-note"></div>
        <audio id="audio" loop></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const songs = {
            1: { t: "Lae Dooba", m: "laedooba.mp3", n: "sach me mainu ishq tera lae dooba snehaaa" },
            2: { t: "Rishte Naate", m: "rishtenaate.mp3", n: "Tu mere liye mera ghar hai sneha saare rishte naato se upar" },
            3: { t: "Do You Know", m: "doyouknow.mp3", n: "Do you know mai tainu kinna pyaar karda?" },
            // ... add others similarly
        };

        const list = document.getElementById('list');
        Object.keys(songs).forEach(id => {
            list.innerHTML += `
                <div class="track-item" onclick="openPlayer(${id})">
                    <div style="font-weight:bold;">${songs[id].t}</div>
                </div>`;
        });

        let swiper = null;

        function openPlayer(id) {
            const s = songs[id];
            const audio = document.getElementById('audio');
            const wall = document.getElementById('p-wall');
            
            // PATH LOGIC FIX: Song 1 is in /snehify/, Song 2 is in /
            const path = (id == 1) ? './snehify/' : './';
            const ext = (id == 1) ? 'JPG' : 'jpg';

            document.getElementById('p-title').innerText = s.t;
            document.getElementById('p-note').innerText = s.n;
            audio.src = `./snehify/${s.m}`;

            wall.innerHTML = '';
            for(let i=1; i<=5; i++) {
                wall.innerHTML += `<div class="swiper-slide"><img src="${path}s${id}p${i}.${ext}"></div>`;
            }

            document.getElementById('player-overlay').style.display = 'flex';
            audio.play();

            // SWIPER FIX: Using 'fade' instead of 'cards' to stop lagging
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", {
                effect: "fade",
                fadeEffect: { crossFade: true },
                loop: true,
                autoplay: { delay: 3000 },
            });
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('audio').pause();
        }
    </script>
</body>
</html>
