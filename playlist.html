<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneh-ify | Memories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        :root {
            --page-beige: #F5F5DC;
            --pink-accent: #FF6B9D;
            --doodle-brown: #5D4037;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body {
            background-color: var(--page-beige);
            color: var(--doodle-brown);
            font-family: 'Absans Regular', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        /* --- More Background Elements --- */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        .sticker { position: absolute; opacity: 0.12; animation: float 10s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(20deg); }
        }

        .header { padding: 60px 20px 30px; border-bottom: 2px dashed var(--doodle-brown); }
        .header h1 { font-family: 'Harmond Bold'; font-size: 2.8rem; color: var(--pink-accent); margin: 0; }
        
        .track-list { padding: 20px; }
        .track-item {
            display: flex; align-items: center;
            padding: 15px; margin-bottom: 20px;
            border-radius: 18px; background: #fff;
            border: 2px solid var(--doodle-brown);
            box-shadow: 6px 6px 0px var(--doodle-brown);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
        }
        .track-item:hover { transform: scale(1.02); box-shadow: 10px 10px 0px var(--pink-accent); }

        .thumb { width: 65px; height: 65px; border-radius: 12px; margin-right: 15px; object-fit: cover; border: 2px solid var(--doodle-brown); }

        /* --- Optimized Glass Player --- */
        #player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass); z-index: 1000;
            display: none; flex-direction: column;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 20px; box-sizing: border-box;
        }

        .record {
            width: 70px; height: 70px; background: #111;
            border-radius: 50%; border: 4px solid #333;
            display: flex; align-items: center; justify-content: center;
            animation: spin 10s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .record-label { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* --- Swiper Anti-Lag Config --- */
        .swiper { width: 100%; height: 50vh; margin-bottom: 20px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: transparent; }
        .swiper-slide img {
            max-width: 90%; max-height: 100%;
            object-fit: contain;
            border-radius: 10px; border: 10px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: #fff;
        }

        .note-container {
            width: 100%; padding: 25px;
            background: #fff; border-radius: 20px;
            border: 2px solid var(--doodle-brown);
            box-shadow: 6px 6px 0px var(--doodle-brown);
            text-align: center;
        }
        .note-container p { font-family: 'Caveat', cursive; font-size: 1.5rem; color: var(--doodle-brown); margin: 0; }

        .close-icon { position: absolute; top: 25px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--doodle-brown); z-index: 1001; }
        .btn-main-final {
            background: var(--pink-accent); color: white; padding: 18px 40px; font-weight: bold;
            text-decoration: none; border-radius: 50px; border: 2.5px solid var(--doodle-brown);
            box-shadow: 6px 6px 0px var(--doodle-brown); display: block; width: fit-content; margin: 40px auto;
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <span class="sticker" style="top:5%; left:5%; font-size: 4rem;">🖼️</span>
        <span class="sticker" style="top:15%; right:8%; font-size: 3rem; animation-delay: 1s;">✨</span>
        <span class="sticker" style="top:40%; left:2%; font-size: 2.5rem; animation-delay: 3s;">🦋</span>
        <span class="sticker" style="bottom:25%; left:10%; font-size: 5rem; animation-delay: 2s;">🧸</span>
        <span class="sticker" style="bottom:10%; right:10%; font-size: 4rem; animation-delay: 1.5s;">🌷</span>
        <span class="sticker" style="bottom:45%; right:5%; font-size: 3rem; animation-delay: 4s;">⭐</span>
        <span class="sticker" style="top:70%; left:5%; font-size: 3.5rem; animation-delay: 2.5s;">🎈</span>
    </div>

    <div class="header">
        <h1>Sneh-ify</h1>
        <p>A collection of us.</p>
    </div>

    <div class="track-list" id="main-track-list"></div>

    <a href="final.html" class="btn-main-final">The Last Surprise ➜</a>

    <div id="player-overlay">
        <div class="close-icon" onclick="exitPlayer()">✕</div>
        <div class="player-top-row" style="display:flex; align-items:center; margin-top:40px; margin-bottom:20px;">
            <div class="record"><img id="player-banner" src="" class="record-label"></div>
            <div id="player-song-title" class="player-title" style="margin-left:15px; font-family:'Harmond Bold'; font-size:1.5rem; color:var(--pink-accent);"></div>
        </div>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="photo-wall"></div>
        </div>
        <div class="note-container"><p id="player-text"></p></div>
        <audio id="audio-engine" loop></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const library = {
            1: { title: "Lae Dooba", banner: "s1b1.png", mp3: "laedooba.mp3", note: "sach me mainu ishq tera lae dooba snehaaa" },
            2: { title: "Rishte Naate", banner: "s2b1.png", mp3: "rishtenaate.mp3", note: "Tu mere liye mera ghar hai sneha saare rishte naato se upar" },
            3: { title: "Do You Know", banner: "s3b1.png", mp3: "doyouknow.mp3", note: "Do you know mai tainu kinna pyaar karda?" },
            4: { title: "Tu Chaiye", banner: "s4b1.png", mp3: "tuchaiye.mp3", note: "Sirf tu chaiye sneha" },
            5: { title: "Mera Yaar", banner: "s5b1.png", mp3: "merayaar.mp3", note: "mai mandir maszid kyun hi jaun tu hi mere liye meri bhagwaan hai" },
            6: { title: "Tujh Me Rab Dikhta Hai", banner: "s6b1.png", mp3: "tujhmerabdikhtahai.mp3", note: "Tujh me rab dikhta hai mai kya karu" },
            7: { title: "In Dino", banner: "s7b1.png", mp3: "indino.mp3", note: "tujh ko chupa kar mai rakh lu kahi sabse dooooooor" },
            8: { title: "Khat", banner: "s8b1.png", mp3: "khat.mp3", note: "tere liye mandir jau bhagwan me naam maan kar bhi bhagwaan se tere liye pray karta hu" },
            9: { title: "Meri Banogi Kya", banner: "s9b1.png", mp3: "meribanogikya.mp3", note: "meri banogi kya meri rahogi kya ?" },
            10: { title: "I Love You", banner: "s10b1.png", mp3: "iloveyou.mp3", note: "i love you sneha" },
            11: { title: "Humsafar", banner: "s11b1.png", mp3: "humsafar.mp3", note: "kya meri humsafar banegi sneha?" },
            12: { title: "Marjaayen", banner: "s12b1.png", mp3: "marjaayen.mp3", note: "ahhhh !!!" }
        };

        const listContainer = document.getElementById('main-track-list');
        Object.keys(library).forEach(id => {
            const song = library[id];
            const bannerPath = (id == 1) ? `./snehify/${song.banner}` : `./${song.banner}`;
            listContainer.innerHTML += `
                <div class="track-item" onclick="launchPlayer(${id})">
                    <img src="${bannerPath}" class="thumb">
                    <div class="info"><h3>${song.title}</h3><p>Tap to play memories</p></div>
                </div>`;
        });

        const overlay = document.getElementById('player-overlay');
        const player = document.getElementById('audio-engine');
        let swiperInstance = null;

        function launchPlayer(id) {
            const data = library[id];
            player.src = `./snehify/${data.mp3}`;
            
            const photoExt = (id == 1) ? 'JPG' : 'jpg';
            const imgBasePath = (id == 1) ? './snehify/' : './';

            document.getElementById('player-banner').src = `${imgBasePath}${data.banner}`;
            document.getElementById('player-song-title').innerText = data.title;
            document.getElementById('player-text').innerText = data.note;

            const wall = document.getElementById('photo-wall');
            wall.innerHTML = '';
            for(let i=1; i<=5; i++) {
                // FIXED Rishte Naate (ID 2) to ensure it pulls correctly from ROOT with .jpg
                wall.innerHTML += `
                    <div class="swiper-slide">
                        <img data-src="${imgBasePath}s${id}p${i}.${photoExt}" class="swiper-lazy">
                        <div class="swiper-lazy-preloader"></div>
                    </div>`;
            }

            overlay.style.display = 'flex';
            player.play();

            if(swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper(".mySwiper", {
                effect: "cards",
                lazy: { loadPrevNext: true },
                grabCursor: true,
                loop: true,
                cardsEffect: { perSlideRotate: 2, slideShadows: false }
            });
        }

        function exitPlayer() { overlay.style.display = 'none'; player.pause(); }
    </script>
</body>
</html>
