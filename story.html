<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --pink-1: #FF6B9D;
            --page-beige: #F5F5DC;
            --doodle-brown: #5D4037;
        }

        body { 
            background-color: var(--page-beige); 
            margin: 0; 
            font-family: 'Absans Regular', sans-serif; 
            color: var(--doodle-brown);
            background-image: radial-gradient(#d1d1b3 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        /* --- FLOATING DOODLES --- */
        .bg-doodles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .doodle {
            position: absolute; color: var(--pink-1); opacity: 0.2;
            font-size: 1.5rem; animation: float 12s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- HEADER & SCROLL HINT --- */
        .counter-section {
            height: 70vh; /* Increased height to make room for scroll hint */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            position: relative; z-index: 2;
        }
        .counter-title { font-family: 'Harmond Bold'; font-size: 1.5rem; margin-bottom: 10px; }
        #timer { font-family: 'Harmond Bold'; font-size: 1.8rem; color: var(--pink-1); margin-bottom: 30px; }

        .scroll-hint { font-size: 0.8rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .doodle-arrow { font-size: 2rem; color: var(--pink-1); animation: bounce 1.5s infinite; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- TIMELINE --- */
        .timeline { position: relative; max-width: 800px; margin: 0 auto; padding: 50px 10px; z-index: 2; }
        .timeline::after {
            content: ''; position: absolute; width: 3px; background: var(--doodle-brown);
            top: 0; bottom: 0; left: 50%; margin-left: -1.5px; z-index: 1; 
        }

        .container { 
            padding: 15px 30px; position: relative; width: 50%; 
            box-sizing: border-box; opacity: 0; 
            transform: translateY(30px); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }
        .container.show { opacity: 1; transform: translateY(0); }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }

        /* --- CONTENT BOX (Works on Mobile) --- */
        .content {
            padding: 35px 20px 20px 20px; 
            background: #fff;
            border: 2px solid var(--doodle-brown);
            box-shadow: 5px 5px 0px var(--doodle-brown);
            display: inline-block; width: 100%; box-sizing: border-box;
        }
        .left .content { transform: rotate(-3deg); }
        .right .content { transform: rotate(3deg); }

        /* --- NO CROPPING FIX --- */
        .content img, .content video {
            width: 100%; 
            height: auto; /* Reverts from fixed height back to natural aspect ratio */
            object-fit: contain; /* Prevents cropping, fits whole image/video into the box */
            margin-top: 15px; 
            display: block; 
            border: 1px solid #eee;
        }

        .date-label { font-size: 0.8rem; font-weight: bold; color: var(--pink-1); display: block; margin-bottom: 5px; }
        .content h2 { font-family: 'Harmond Bold'; font-size: 1.1rem; margin: 0; color: var(--pink-1); line-height: 1.2; }
        .content p { font-size: 0.85rem; margin-top: 10px; font-style: italic; color: #666; }

        /* --- FOOTER --- */
        .footer-nav { padding: 80px 0; text-align: center; position: relative; z-index: 5; }
        .btn-next {
            background: var(--pink-1); color: white; padding: 15px 50px; 
            text-decoration: none; border: 2px solid var(--doodle-brown); 
            box-shadow: 4px 4px 0px var(--doodle-brown); font-weight: bold;
        }

        @media screen and (max-width: 600px) {
            .timeline::after { left: 20px; }
            .container { width: 100%; padding-left: 50px; padding-right: 20px; text-align: left !important; }
            .left, .right { left: 0; }
            .left .content { transform: rotate(-1.5deg); }
            .right .content { transform: rotate(1.5deg); }
            .content { padding-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="bg-doodles" id="doodle-container"></div>
    <audio id="bgMusic" autoplay loop playsinline preload="auto"><source src="storysong.mp3" type="audio/mp3"></audio>

    <section class="counter-section">
        <div class="counter-title">You've been blessing this world for</div>
        <div id="timer">0 DAYS</div>
        
        <span class="scroll-hint">Scroll down</span>
        <div class="doodle-arrow">↴</div>
    </section>

    <div class="timeline">
        <div class="container left">
            <div class="content">
                <span class="date-label">March 21, 2006</span>
                <h2>The Day You Were Born</h2>
                <img src="sn1.png">
                <p>The world officially became a better place.</p>
            </div>
        </div>
        <div class="container right">
            <div class="content">
                <h2>Different Worlds</h2>
                <img src="sn2.png">
                <p>Growing up apart, just waiting for destiny.</p>
            </div>
        </div>

        <div class="container right">
            <div class="content">
                <h2>Forever</h2>
                <img src="sn14.png">
                <p>It's always going to be you. Forever.</p>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <a href="final.html" class="btn-next">Next</a>
    </div>

    <script src="file/jquery.min.js"></script>
    <script>
        // DOODLE GENERATOR
        const symbols = ['❤', '★', '✨', '☁', '✿'];
        const container = document.getElementById('doodle-container');
        for (let i = 0; i < 15; i++) {
            const d = document.createElement('div');
            d.className = 'doodle';
            d.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            d.style.left = Math.random() * 90 + 'vw';
            d.style.animationDuration = (Math.random() * 5 + 7) + 's';
            d.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(d);
        }

        // TIMER
        const birthDate = new Date(2006, 2, 21);
        function updateTimer() {
            const diff = new Date() - birthDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            document.getElementById('timer').innerHTML = `${days} DAYS, ${hours} HOURS & ${mins} MINS`;
        }
        setInterval(updateTimer, 1000); updateTimer();

        // SCROLL REVEAL & AUTOMATIC AUDIO Fix
        const audio = document.getElementById('bgMusic');
        
        // This function attempts play as soon as she interacts (even a tiny scroll or touch)
        function startAudio() {
            if (audio.paused) {
                audio.play();
                window.removeEventListener('touchstart', startAudio);
                window.removeEventListener('scroll', startAudio);
            }
        }

        // listeners for automatic audio on mobile
        window.addEventListener('load', startAudio); // Try immediate load
        window.addEventListener('touchstart', startAudio); // Try on thumb press
        window.addEventListener('scroll', startAudio); // Try on scroll

        // Scroll reveal logic
        $(window).on('scroll', function() {
            $('.container').each(function() {
                if ($(window).scrollTop() + $(window).height() > $(this).offset().top + 50) {
                    $(this).addClass('show');
                }
            });
        });
    </script>
</body>
</html>
