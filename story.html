<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --pink-1: #FF6B9D;
            --page-beige: #F5F5DC;
            --doodle-brown: #5D4037;
        }

        body { 
            background-color: var(--page-beige); 
            margin: 0; 
            font-family: 'Absans Regular', sans-serif; 
            color: var(--doodle-brown);
            background-image: radial-gradient(#d1d1b3 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        /* --- IDEA 1: FLOATING DOODLES --- */
        .bg-doodles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .doodle {
            position: absolute; color: var(--pink-1); opacity: 0.3;
            font-size: 1.5rem; animation: float 10s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- HEADER --- */
        .counter-section {
            height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            position: relative; z-index: 2;
        }
        .counter-title { font-family: 'Harmond Bold'; font-size: 1.5rem; margin-bottom: 10px; }
        #timer { font-family: 'Harmond Bold'; font-size: 1.8rem; color: var(--pink-1); }

        /* --- TIMELINE --- */
        .timeline { position: relative; max-width: 800px; margin: 0 auto; padding: 50px 10px; z-index: 2; }
        .timeline::after {
            content: ''; position: absolute; width: 3px; background: var(--doodle-brown);
            top: 0; bottom: 0; left: 50%; margin-left: -1.5px; z-index: 1; 
        }

        .container { 
            padding: 15px 30px; position: relative; width: 50%; 
            box-sizing: border-box; opacity: 0; 
            transform: translateY(30px); transition: all 0.6s ease;
            z-index: 2;
        }
        .container.show { opacity: 1; transform: translateY(0); }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }

        /* --- IDEA 3: POLAROID TILT --- */
        .content {
            padding: 35px 20px 20px 20px; 
            background: #fff;
            border: 2px solid var(--doodle-brown);
            border-radius: 2px; /* Sharper edges like a real photo */
            box-shadow: 5px 5px 0px var(--doodle-brown);
            display: inline-block; width: 100%; box-sizing: border-box;
            transition: transform 0.3s ease;
        }
        .left .content { transform: rotate(-2deg); }
        .right .content { transform: rotate(2deg); }
        .content:hover { transform: rotate(0deg) scale(1.02) !important; z-index: 10; }

        .content img, .content video {
            width: 100%; border-radius: 0; /* Square like a polaroid */
            margin-top: 15px; display: block; border: 1px solid #eee;
        }

        .date-label { font-size: 0.8rem; font-weight: bold; color: var(--pink-1); display: block; margin-bottom: 5px; }
        .content h2 { font-family: 'Harmond Bold'; font-size: 1.2rem; margin: 0; color: var(--pink-1); line-height: 1.2; }
        .content p { font-size: 0.85rem; margin-top: 10px; font-style: italic; color: #666; }

        /* --- FOOTER --- */
        .footer-nav { padding: 100px 0; text-align: center; position: relative; z-index: 5; }
        .btn-next {
            background: var(--pink-1); color: white; padding: 15px 40px; 
            text-decoration: none; border: 2px solid var(--doodle-brown); 
            box-shadow: 4px 4px 0px var(--doodle-brown);
        }

        @media screen and (max-width: 600px) {
            .timeline::after { left: 20px; }
            .container { width: 100%; padding-left: 50px; padding-right: 15px; text-align: left !important; }
            .left, .right { left: 0; }
            .content { padding-top: 40px; transform: rotate(0deg) !important; } /* Straighten on mobile for easier reading */
        }
    </style>
</head>
<body>

    <div class="bg-doodles" id="doodle-container"></div>

    <audio id="bgMusic" autoplay loop playsinline preload="auto">
        <source src="storysong.mp3" type="audio/mp3">
    </audio>

    <section class="counter-section">
        <div class="counter-title">You've been blessing this world for</div>
        <div id="timer">0 DAYS</div>
    </section>

    <div class="timeline">
        <div class="container left">
            <div class="content">
                <span class="date-label">March 21, 2006</span>
                <h2>The Day You Were Born</h2>
                <img src="sn1.png">
                <p>The world officially became a better place.</p>
            </div>
        </div>
        <div class="container right">
            <div class="content">
                <h2>Different Worlds</h2>
                <img src="sn2.png">
                <p>Different schools, different lives, just waiting for destiny.</p>
            </div>
        </div>

        <div class="container right">
            <div class="content">
                <h2>Forever</h2>
                <img src="sn14.png">
                <p>Through every mile and every moment... it's you.</p>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <a href="final.html" class="btn-next">Next</a>
    </div>

    <script src="file/jquery.min.js"></script>
    <script>
        // CREATE FLOATING DOODLES
        const symbols = ['❤', '★', '☀', '☁', '✿', '✨'];
        const container = document.getElementById('doodle-container');
        for (let i = 0; i < 20; i++) {
            const doodle = document.createElement('div');
            doodle.className = 'doodle';
            doodle.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            doodle.style.left = Math.random() * 100 + 'vw';
            doodle.style.animationDuration = (Math.random() * 5 + 5) + 's';
            doodle.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(doodle);
        }

        // AUDIO AUTO-PLAY FIX
        window.addEventListener('load', function() {
            const audio = document.getElementById('bgMusic');
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    window.addEventListener('touchstart', () => { audio.play(); }, {once: true});
                    window.addEventListener('scroll', () => { audio.play(); }, {once: true});
                });
            }
        });

        // BIRTH TIMER
        const birthDate = new Date(2006, 2, 21);
        function updateTimer() {
            const now = new Date();
            const diff = now - birthDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            document.getElementById('timer').innerHTML = days + " DAYS, " + hours + " HOURS & " + mins + " MINS";
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // SCROLL REVEAL
        $(window).on('scroll', function() {
            $('.container').each(function() {
                if ($(window).scrollTop() + $(window).height() > $(this).offset().top + 50) {
                    $(this).addClass('show');
                }
            });
        });
    </script>
</body>
</html>
