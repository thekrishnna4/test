<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <style>
        @font-face { font-family: 'Harmond Bold'; src: url('Harmond bold.otf'); }
        @font-face { font-family: 'Absans Regular'; src: url('Absans Regular.otf'); }

        :root {
            --pink-1: #FF6B9D;
            --page-beige: #F5F5DC;
            --doodle-brown: #5D4037;
        }

        body { 
            background-color: var(--page-beige); 
            margin: 0; 
            font-family: 'Absans Regular', sans-serif; 
            color: var(--doodle-brown);
            background-image: radial-gradient(#d1d1b3 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        /* --- MUSIC OVERLAY --- */
        #music-start {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245, 245, 220, 0.95);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        #music-start h2 { font-family: 'Harmond Bold'; color: var(--pink-1); }

        /* --- HEADER --- */
        .counter-section {
            height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        .counter-title { font-family: 'Harmond Bold'; font-size: 1.5rem; margin-bottom: 10px; }
        #timer { font-family: 'Harmond Bold'; font-size: 1.8rem; color: var(--pink-1); }

        /* --- TIMELINE --- */
        .timeline { position: relative; max-width: 800px; margin: 0 auto; padding: 50px 10px; }
        
        /* The Line - Lower Z-index so it stays behind cards */
        .timeline::after {
            content: '';
            position: absolute;
            width: 3px; background: var(--doodle-brown);
            top: 0; bottom: 0; left: 50%;
            margin-left: -1.5px;
            z-index: 1; 
        }

        .container { 
            padding: 15px 30px; position: relative; width: 50%; 
            box-sizing: border-box; opacity: 0; 
            transform: translateY(30px); transition: all 0.6s ease;
            z-index: 2; /* Keeps cards above the line */
        }
        .container.show { opacity: 1; transform: translateY(0); }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }

        /* Content Box - Added margin-top to prevent clipping */
        .content {
            padding: 20px;
            background: #fff;
            border: 2px solid var(--doodle-brown);
            border-radius: 15px 5px 15px 5px;
            box-shadow: 5px 5px 0px var(--doodle-brown);
            display: inline-block;
            margin-top: 10px; /* Space from top edge */
        }

        .content img, .content video {
            width: 100%; border-radius: 10px;
            margin-top: 10px; display: block;
        }

        .date-label { font-size: 0.8rem; font-weight: bold; color: var(--pink-1); display: block; }
        .content h2 { font-family: 'Harmond Bold'; font-size: 1.2rem; margin: 8px 0; color: var(--pink-1); line-height: 1.2; }
        .content p { font-size: 0.85rem; margin-top: 10px; font-style: italic; }

        /* --- MOBILE FIXES --- */
        @media screen and (max-width: 600px) {
            .timeline::after { left: 20px; } /* Move line to the side */
            .container { width: 100%; padding-left: 50px; padding-right: 15px; text-align: left !important; }
            .left, .right { left: 0; }
            .content { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div id="music-start">
        <h2>Click to start the story</h2>
        <p>♫ (with sound)</p>
    </div>

    <audio id="bgMusic" loop><source src="storysong.mp3" type="audio/mp3"></audio>

    <section class="counter-section">
        <div class="counter-title">You've been blessing this world for</div>
        <div id="timer">0 DAYS</div>
    </section>

    <div class="timeline">
        <div class="container left">
            <div class="content">
                <span class="date-label">March 21, 2006</span>
                <h2>The Day You Were Born</h2>
                <img src="sn1.jpeg">
                <p>The world got a lot more beautiful.</p>
            </div>
        </div>

        <div class="container right">
            <div class="content">
                <h2>Different Worlds</h2>
                <img src="sn2.png">
                <p>Growing up apart, just waiting for destiny.</p>
            </div>
        </div>

        <div class="container left">
            <div class="content">
                <span class="date-label">July 25, 2021</span>
                <h2>KV Mathura Cantt</h2>
                <img src="sn3.png">
                <p>The day you arrived in my world.</p>
            </div>
        </div>

        </div>

    <div style="padding: 100px 0; text-align: center;">
        <a href="final.html" style="background: var(--pink-1); color: white; padding: 15px 40px; text-decoration: none; border: 2px solid var(--doodle-brown); box-shadow: 4px 4px 0px var(--doodle-brown);">Next</a>
    </div>

    <script src="file/jquery.min.js"></script>
    <script>
        // Start Audio and Hide Overlay
        $('#music-start').on('click', function() {
            document.getElementById('bgMusic').play();
            $(this).fadeOut();
        });

        // Birth Timer
        const birthDate = new Date(2006, 2, 21);
        function updateTimer() {
            const now = new Date();
            const diff = now - birthDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            document.getElementById('timer').innerHTML = days + " DAYS, " + hours + " HOURS & " + mins + " MINS";
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Scroll Reveal
        $(window).on('scroll', function() {
            $('.container').each(function() {
                if ($(window).scrollTop() + $(window).height() > $(this).offset().top + 50) {
                    $(this).addClass('show');
                }
            });
        });
    </script>
</body>
</html>
